name: Deploy to GitHub Pages

# Builds the Astro site and publishes it to GitHub Pages.
#
# NOTE: this fires on pushes to the default branch. Scaffolding currently lives
# on a feature branch, so deploys begin once that branch is merged to default.
# Remember to enable Pages in the repo settings (Settings → Pages → Source:
# "GitHub Actions") before the first run.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        # withastro/action installs deps, runs `astro build`, and uploads the
        # Pages artifact. `path` defaults to ./dist.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
